<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10: Decoración de Texto</title>
    <link rel="stylesheet" href="ejercicio10.css">
</head>
<body>
    <p class="sin-decoracion">Este es un párrafo sin decoración.</p>
    <p class="heredada">Párrafo con decoración heredada (inherit).</p>
    <p class="encima">Párrafo con decoracion encima (overline).</p>
    <p class="medio">Párrafo con decoración al medio (through).</p>
    <p class="debajo">Párrafo con decoración debajo (underline).</p>
</body>
</html>
