<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 11 - Transformación del texto</title>
    <link rel="stylesheet" href="css/ej11.css">
</head>
<body>
    <h2>Ejercicio 11:</h2>
    <p class="normal">
        Párrafo sin transformación.
    </p>
    <p class="capitalize">
        Párrafo con transformación "capitalize". Esto significa que pone la primera letra de cada palabra en mayúscula.
    </p>
    <p class="uppercase">
        Párrafo con transformación mayúscula (uppercase).
    </p>
    <p class="lowercase">
        Párrafo con transformación minúscula (lowercase).
    </p>
</body>
</html>
