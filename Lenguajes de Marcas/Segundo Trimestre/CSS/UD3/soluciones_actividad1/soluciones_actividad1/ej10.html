<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 10 - Decoración del texto</title>
    <link rel="stylesheet" href="css/ej10.css">
</head>
<body>
    <h2>Ejercicio 10:</h2>
    <p class="sin-decoracion">
        Este es un párrafo sin decoración.
    </p>
    <p class="heredada">
        Párrafo con decoración heredada (inherit).
    </p>
    <p class="encima">
        Párrafo con decoración encima (overline).
    </p>
    <p class="medio">
        Párrafo con decoración al medio (through).
    </p>
    <p class="debajo">
        Párrafo con decoración debajo (underline).
    </p>
</body>
</html>
