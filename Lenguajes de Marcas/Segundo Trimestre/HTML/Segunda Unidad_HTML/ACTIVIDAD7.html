<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tabla con columnas unidas</title>
  <style>
    table {
      border-collapse: collapse;
      width: 50%;
    }
    td {
      border: 1px solid black;
      padding: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <table>
    <tr>
      <td>Item 1</td>
      <td colspan="2">Item 2 (ocupa columnas 2 y 3)</td>
    </tr>
    <tr>
      <td>Item 3</td>
      <td>Item 4</td>
      <td>Item 5</td>
    </tr>
  </table>
</body>
</html>
