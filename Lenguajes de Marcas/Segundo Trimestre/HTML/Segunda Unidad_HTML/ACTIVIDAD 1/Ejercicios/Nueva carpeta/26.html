<form>
    <fieldset>
        <legend>Datos personales</legend>
        <p><label>Nombre:</label> <input type="text"></p>
        <p><label>Correo electrónico:</label> <input type="email"></p>
        <p><input type="checkbox"> ¿Quieres que te enviemos publicidad?</p>
    </fieldset>
    <fieldset>
        <legend>Temática y mes de vacaciones</legend>
        <select>
            <option>Hotel</option>
            <option>Rural</option>
            <option>Playa</option>
        </select>
        <p>
            <input type="radio" name="mes"> Julio
            <input type="radio" name="mes"> Agosto
            <input type="radio" name="mes"> Septiembre
        </p>
    </fieldset>
    <fieldset>
        <legend>Consulta</legend>
        <textarea rows="4" cols="50"></textarea>
    </fieldset>
    <input type="submit" value="Enviar">
</form>
