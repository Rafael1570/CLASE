<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aplicativo para Trabajar en Amazon</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 30px;
    }

    .form-container {
        background: white;
        padding: 25px;
        max-width: 900px;
        margin: auto;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 28px;
    }

    fieldset {
        border: 2px solid #5a8dee;
        border-radius: 10px;
        margin-bottom: 25px;
        padding: 20px;
    }

    legend {
        font-weight: bold;
        padding: 0 10px;
        color: #5a8dee;
        font-size: 18px;
    }

    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 12px;
    }

    td:first-child {
        width: 160px;
        font-weight: bold;
        text-align: right;
        padding-right: 10px;
        color: #333;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        transition: 0.2s;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #5a8dee;
        box-shadow: 0 0 6px rgba(90,141,238,0.3);
        outline: none;
    }

    textarea {
        height: 150px;
        resize: none;
    }

    .btn {
        display: block;
        width: 200px;
        margin: auto;
        margin-top: 10px;
        background: #5a8dee;
        padding: 12px;
        text-align: center;
        border-radius: 8px;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 16px;
        transition: 0.2s;
    }

    .btn:hover {
        background: #467cd4;
    }
</style>
</head>

<body>

<div class="form-container">

    <h1>APLICATIVO PARA TRABAJAR EN AMAZON</h1>

    <form>

        <!-- DATOS PERSONALES -->
        <fieldset>
            <legend>DATOS PERSONALES</legend>

            <table>
                <tr>
                    <td>Nombre:</td>
                    <td><input type="text"></td>

                    <td>Apellidos:</td>
                    <td><input type="text"></td>
                </tr>

                <tr>
                    <td>Telf. Móvil:</td>
                    <td><input type="text"></td>

                    <td>DNI:</td>
                    <td><input type="text"></td>
                </tr>

                <tr>
                    <td>Calle:</td>
                    <td colspan="3"><input type="text"></td>
                </tr>

                <tr>
                    <td>Código Postal:</td>
                    <td><input type="text"></td>

                    <td>Provincia:</td>
                    <td>
                        <select>
                            <option>Almería</option>
                            <option>Madrid</option>
                            <option>Barcelona</option>
                            <option>Sevilla</option>
                        </select>
                    </td>
                </tr>

            </table>
        </fieldset>

        <!-- EXPERIENCIA LABORAL -->
        <fieldset>
            <legend>EXPERIENCIA LABORAL</legend>
            <textarea></textarea>
        </fieldset>

        <button type="submit" class="btn">Enviar</button>

    </form>
</div>

</body>
</html>
