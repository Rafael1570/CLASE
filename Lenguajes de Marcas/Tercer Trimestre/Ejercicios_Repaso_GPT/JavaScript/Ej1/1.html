<!-- Ejercicio 1: Botón que cambia de color

Objetivo: Crear una página con un botón. Al hacer clic en el botón, el color de fondo de la página debe cambiar a un color aleatorio.

Pasos para hacerlo:
Estructura básica de HTML: Necesitarás un botón en tu página para que el usuario pueda hacer clic.
Lógica de JavaScript: Deberás crear una función que genere un color aleatorio y lo aplique al fondo de la página al hacer clic en el botón. -->

<html>
<head>
    <link rel="stylesheet" href="1.css">
    <title>Ejercicio 1</title>
</head>
<body>
    <h1>Botón que cambia de color</h1>
    <button id="colorButton">Cambiar color de fondo</button>

    <script src="1.js"></script>
</body>
</html>
