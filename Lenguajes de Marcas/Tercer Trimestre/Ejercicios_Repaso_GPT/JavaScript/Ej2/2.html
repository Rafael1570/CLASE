<!-- Ejercicio 2: Agregar y eliminar elementos de una lista

Objetivo: Crear una página con un formulario que contenga un campo de texto y dos botones:

Un botón para agregar un ítem (nombre) a una lista.
Un botón para eliminar el último ítem de la lista. -->
<!DOCTYPE html>
<html>
<head>
    <title>Ejercicio 2</title>
    <link rel="stylesheet" href="2.css">
</head>
<body>
    <h1>Lista de Nombres</h1>
    <input type="text" id="nombreInput" placehlder="Escribe un nombre">
    <button id="agregarBtn">Agregar</button>
    <button id="eliminarBtn">Eliminar Último</button>

    <ul id="lista"></ul>

    <script src="2.js"></script>
</body>
</html>
