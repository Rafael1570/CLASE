<!--Ejercicio 2: Crear una Card
Objetivo: Crear una tarjeta (Card) usando Bootstrap. La tarjeta debe contener:
Una imagen en la parte superior.
Un título.
Un texto descriptivo.
Un botón que diga "Leer más".
Asegúrate de usar las clases card, card-img-top, card-body, card-title, card-text y btn.-->
<html>
<head>
    <title>Ejercicio 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="card">
        <img src="https://via.placeholder.com/150" class="card-img-top" alt="Imagen de ejemplo">
        <div class="card-body">
            <h5 class="card-title">Titulo</h5>
            <p class="card-tex">Esto es un texto de ejemplo mientras repaso para el examen de mañana</p>
            <a href="#" class="btn btn-primary">Leer más</a>
        </div>
    </div>
</body>
</html>
