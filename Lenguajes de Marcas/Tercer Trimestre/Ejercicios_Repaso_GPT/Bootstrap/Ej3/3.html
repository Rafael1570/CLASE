<!--Ejercicio 3: Grid System

Objetivo: Crear una página usando el sistema de rejillas (grid) de Bootstrap. La página debe tener:

Un header que ocupe todo el ancho de la pantalla (12 columnas).
Tres columnas en el cuerpo de la página (cada columna debe ocupar 4 columnas, es decir, col-md-4).
Un footer que también ocupe todo el ancho de la pantalla (12 columnas). -->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid System - Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Header -->
    <header class="bg-primary text-white text-center p-3">
        <h1>Bienvenidos a Mi Página Web</h1>
    </header>

    <!-- Main Content -->
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <img src="https://via.placeholder.com/150" class="card-img-top" alt="Imagen de ejemplo">
                    <div class="card-body">
                        <h5 class="card-title">Columna 1</h5>
                        <p class="card-text">Este es el contenido de la primera columna.</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="https://via.placeholder.com/150" class="card-img-top" alt="Imagen de ejemplo">
                    <div class="card-body">
                        <h5 class="card-title">Columna 2</h5>
                        <p class="card-text">Este es el contenido de la segunda columna.</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="https://via.placeholder.com/150" class="card-img-top" alt="Imagen de ejemplo">
                    <div class="card-body">
                        <h5 class="card-title">Columna 3</h5>
                        <p class="card-text">Este es el contenido de la tercera columna.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-5">
        <p>© 2026 Mi Página Web</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
