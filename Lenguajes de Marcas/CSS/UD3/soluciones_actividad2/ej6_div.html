<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tablero de ajedrez</title>
  <link rel="stylesheet" href="css/ej6_div.css" />
</head>
<body>

<div class="tablero">
  <!-- Cabecera letras -->
  <div class="esquina"></div>
  <div class="letra">A</div><div class="letra">B</div><div class="letra">C</div><div class="letra">D</div>
  <div class="letra">E</div><div class="letra">F</div><div class="letra">G</div><div class="letra">H</div>

  <!-- Fila 1 -->
  <div class="numero">1</div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>

  <!-- Fila 2 -->
  <div class="numero">2</div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca pieza blanca-pieza">♙</div><!-- D2 -->
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>

  <!-- Fila 3 -->
  <div class="numero">3</div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra pieza negra-pieza">♟</div><!-- F3 -->
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>

  <!-- Fila 4 -->
  <div class="numero">4</div>
  <div class="casilla negra"></div>
  <div class="casilla blanca pieza blanca-pieza">♙</div><!-- B4 -->
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>

  <!-- Fila 5 -->
  <div class="numero">5</div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra pieza negra-pieza">♟</div><!-- D5 -->
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>

  <!-- Fila 6 -->
  <div class="numero">6</div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>

  <!-- Fila 7 -->
  <div class="numero">7</div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>

  <!-- Fila 8 -->
  <div class="numero">8</div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
  <div class="casilla negra"></div>
  <div class="casilla blanca"></div>
</div>

</body>
</html>
