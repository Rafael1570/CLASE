<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tablero de ajedrez</title>
    <link rel="stylesheet" href="css/ej6_table.css">
</head>
<body>

<table class="tablero">
    <tr>
        <th class="esquina"></th>
        <th class="letra">A</th>
        <th class="letra">B</th>
        <th class="letra">C</th>
        <th class="letra">D</th>
        <th class="letra">E</th>
        <th class="letra">F</th>
        <th class="letra">G</th>
        <th class="letra">H</th>
    </tr>

    <!-- Fila 1 -->
    <tr>
        <th class="numero">1</th>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
    </tr>

    <!-- Fila 2 -->
    <tr>
        <th class="numero">2</th>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca blanca-pieza">♙</td> <!-- D2 -->
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
    </tr>

    <!-- Fila 3 -->
    <tr>
        <th class="numero">3</th>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra negra-pieza">♟</td> <!-- F3 -->
        <td class="blanca"></td>
        <td class="negra"></td>
    </tr>

    <!-- Fila 4 -->
    <tr>
        <th class="numero">4</th>
        <td class="negra"></td>
        <td class="blanca blanca-pieza">♙</td> <!-- B4 -->
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
    </tr>

    <!-- Fila 5 -->
    <tr>
        <th class="numero">5</th>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra negra-pieza">♟</td> <!-- D5 -->
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
    </tr>

    <!-- Fila 6 -->
    <tr>
        <th class="numero">6</th>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
    </tr>

    <!-- Fila 7 -->
    <tr>
        <th class="numero">7</th>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
    </tr>

    <!-- Fila 8 -->
    <tr>
        <th class="numero">8</th>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
        <td class="negra"></td>
        <td class="blanca"></td>
    </tr>
</table>

</body>
</html>
