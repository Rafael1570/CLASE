<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario y Listado de Lenguajes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="7.css">
</head>
<body>

    <!-- Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Interfaz</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Principal</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Precios</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Formulario y tabla de lenguajes -->
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Formulario de Lenguaje</h5>
                    </div>
                    <div class="card-body">
                        <form id="formulario">
                            <div class="mb-3">
                                <label for="lenguaje" class="form-label">Lenguaje</label>
                                <input type="text" class="form-control" id="lenguaje" name="lenguaje" required>
                            </div>
                            <div class="mb-3">
                                <label for="descripcion" class="form-label">Descripción</label>
                                <textarea class="form-control" id="descripcion" name="descripcion" rows="3" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="descripcionLenguaje" class="form-label">Descripción del lenguaje</label>
                                <textarea class="form-control" id="descripcionLenguaje" name="descripcionLenguaje" rows="3" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="numProgramadores" class="form-label">Número de Programadores</label>
                                <input type="number" class="form-control" id="numProgramadores" name="numProgramadores" required>
                            </div>
                            <button type="submit" class="btn btn-success">Guardar</button>
                            <button type="reset" class="btn btn-secondary">Limpiar</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Tabla de Lenguajes -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Listado de lenguajes</h5>
                    </div>
                    <div class="card-body">
                        <table class="table table-dark">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Lenguaje</th>
                                    <th>Cantidad de programadores</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>1</td>
                                    <td>JavaScript</td>
                                    <td>21</td>
                                </tr>
                                <tr>
                                    <td>2</td>
                                    <td>Python</td>
                                    <td>110</td>
                                </tr>
                                <tr>
                                    <td>3</td>
                                    <td>C#</td>
                                    <td>45</td>
                                </tr>
                                <tr>
                                    <td>4</td>
                                    <td>Ruby</td>
                                    <td>31</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
