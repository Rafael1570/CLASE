<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño Responsivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Definimos el color de cada bloque */
        .block-1 { background-color: red; }
        .block-2 { background-color: black; }
        .block-3 { background-color: green; }
        .block-4 { background-color: yellow; }
        .block-5 { background-color: blue; }

        /* Aseguramos que los bloques tengan el mismo tamaño */
        .block {
            width: 100%;
            height: 100px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row">
            <div class="col-12 col-md-6">
                <div class="block block-1"></div>
            </div>
            <div class="col-12 col-md-6">
                <div class="block block-2"></div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 col-md-6">
                <div class="block block-3"></div>
            </div>
            <div class="col-12 col-md-6">
                <div class="block block-4"></div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="block block-5"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
